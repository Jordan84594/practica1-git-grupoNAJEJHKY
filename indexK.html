<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Tarjeta de Información</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #202429, #141416);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .card {
            background: white;
            width: 320px;
            border-radius: 5px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            padding: 40px 20px;
            text-align: center;
        }

        .card h2 {
            margin-bottom: 10px;
            color: #333;
        }

        .info {
            text-align: left;
            margin-top: 15px;
        }

        .info p {
            margin: 8px 0;
            font-size: 14px;
            color: #555;
        }

        .label {
            font-weight: bold;
            color: #222;
        }

        .avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: #d1abab;
            margin: 0 auto 10px;
        }
    </style>
</head>

<body>

    <div class="card">
        <div class="avatar"></div>

        <h2>Kevin</h2>
        <p>Software Engineer</p>

        <div class="info">
            <p><span class="label">Teléfono:</span> +593 99 9999 9999</p>
            <p><span class="label">Email:</span> kevin@email.com</p>
            <p><span class="label">Dirección:</span> lataYork, Ecuador</p>
            <p><span class="label">Edad:</span> 22</p>
        </div>
    </div>

</body>
</html>
